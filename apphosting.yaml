# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# The "version" field is a schema version. Must be 1.
version: 1

# The "runConfig" field is an optional field to configure the behavior of the
# backend.
runConfig:
  # The "cpu" field is an optional field to set the number of CPUs allocated to
  # the backend.
  # https://firebase.google.com/docs/app-hosting/configure#cpu
  cpu: 1

  # The "memoryMiB" field is an optional field to set the amount of memory
  # allocated to the backend.
  # https://firebase.google.com/docs/app-hosting/configure#memory
  memoryMiB: 512

  # The "maxInstances" field is an optional field to set the maximum number of
  # instances that can be running at the same time.
  # https://firebase.google.com/docs/app-hosting/configure#max-instances
  maxInstances: 2

# The "build" field is a required field that contains the commands to build
# the backend.
build:
  # The "command" field is a required field that contains the command to build
  # the backend.
  command: "npm install && npm run build"

  # The "env" field is an optional field that contains the environment variables
  # to be used during the build.
  env:
    - variable: "NODE_ENV"
      value: "production"

# The "headers" field is an optional field to specify the headers to be sent to
# the client.
# https://firebase.google.com/docs/app-hosting/configure#headers
headers: []

# The "redirects" field is an optional field to specify the redirects to be
# performed.
# https://firebase.google.com/docs/app-hosting/configure#redirects
redirects: []

# The "rewrites" field is an optional field to specify the rewrites to be
# performed.
# https://firebase.google.com/docs/app-hosting/configure#rewrites
rewrites: []

# The "env" field is an optional field that contains the environment variables
# to be used during the runtime.
env: []
